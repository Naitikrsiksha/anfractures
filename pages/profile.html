<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AN Clinic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-header { display: flex; align-items: center; gap: 15px; padding: 20px; border-bottom: 1px solid var(--border-color); }
        .back-btn { color: var(--text-white); font-size: 20px; text-decoration: none; }
        .container { padding: 20px; }
        
        /* Login Gate */
        #login-gate { text-align: center; margin-top: 50px; }
        .login-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border-color); color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        .btn-login { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* Profile Content */
        #profile-content { display: none; }
        .profile-avatar { width: 80px; height: 80px; background-color: var(--primary-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto 15px; }
        .history-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .history-date { font-size: 11px; color: var(--text-gray); margin-bottom: 5px; }
        .history-action { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo-circle-small">AN</div>
        <h2 style="font-size: 16px;">AN Clinic</h2>
    </div>

    <div class="container">
        <div id="login-gate">
            <h2><i class="fa-solid fa-shield-halved"></i> Verify Identity</h2>
            <p style="color: var(--text-gray); font-size: 13px; margin: 10px 0 20px;">Enter your 10-digit registered phone number to view history.</p>
            <input type="tel" id="verify-phone" class="login-input" placeholder="Enter 10-digit number" maxlength="10">
            <button id="btn-verify" class="btn-login">View Profile</button>
        </div>

        <div id="profile-content">
            <div style="text-align: center; margin-bottom: 30px;">
                <div class="profile-avatar"><i class="fa-regular fa-user"></i></div>
                <h2>Patient Profile</h2>
                <p id="display-phone" style="color: var(--text-gray); margin-top: 5px;"></p>
            </div>
            
            <h3 style="color: var(--primary-blue); margin-bottom: 15px;"><i class="fa-solid fa-clock-rotate-left"></i> Your Activity History</h3>
            <div id="history-container">
                </div>
            <button onclick="logoutProfile()" style="width:100%; background:transparent; border:1px solid #EF4444; color:#EF4444; padding:12px; border-radius:8px; margin-top:20px;">Sign Out</button>
        </div>
    </div>

    <script>
        document.getElementById('btn-verify').addEventListener('click', () => {
            const phone = document.getElementById('verify-phone').value.trim();
            // STRICT 10-DIGIT CHECK
            if (phone.length !== 10 || isNaN(phone)) {
                alert("Sirf 10 digit ka valid number enter karein!");
                return;
            }
            
            // Save & Show Profile
            localStorage.setItem('user_phone', phone);
            loadProfile(phone);
        });

        function loadProfile(phone) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('profile-content').style.display = 'block';
            document.getElementById('display-phone').innerText = "+91 " + phone;

            const container = document.getElementById('history-container');
            let history = JSON.parse(localStorage.getItem('clinic_history')) || [];
            
            container.innerHTML = ""; // Clear old
            if(history.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:gray; font-size:13px;'>No recent activity found.</p>";
            } else {
                history.forEach(item => {
                    container.innerHTML += `
                        <div class="history-card">
                            <div class="history-date">${item.date}</div>
                            <div class="history-action">${item.action}</div>
                        </div>`;
                });
            }
        }

        function logoutProfile() {
            localStorage.removeItem('user_phone');
            location.reload();
        }

        // Auto-login check
        window.onload = () => {
            const savedPhone = localStorage.getItem('user_phone');
            if(savedPhone) loadProfile(savedPhone);
        };
    </script>
</body>
</html>
