<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - AN Clinic</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        .page-header { display: flex; align-items: center; gap: 15px; padding: 20px; border-bottom: 1px solid var(--border-color); }
        .back-btn { color: var(--text-white); font-size: 20px; text-decoration: none; }
        .page-title h2 { font-size: 18px; display: flex; align-items: center; gap: 10px;}
        .page-title p { font-size: 12px; color: var(--text-gray); margin-top: 4px; }
        
        .gallery-container { padding: 20px; }
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .gallery-item {
            width: 100%;
            height: 160px; /* Image height */
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--bg-card); /* Fallback color */
            border: 1px solid var(--border-color);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Aspect ratio maintain karne ke liye */
        }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="../index.html" class="back-btn"><i class="fa-solid fa-bars"></i></a>
        <div class="logo-circle-small">AN</div>
        <h2 style="font-size: 16px;">AN Clinic</h2>
    </div>

    <div class="page-title" style="padding: 20px 20px 0;">
        <h2><i class="fa-regular fa-image"></i> Clinic Gallery</h2>
        <p>Photos from our clinic and facilities</p>
    </div>

    <div class="gallery-container">
        <div class="gallery-grid">
            <div class="gallery-item"><img src="../assets/images/gallery1.jpg" alt="Clinic Area"></div>
            <div class="gallery-item"><img src="../assets/images/gallery2.jpg" alt="Doctor Consultation"></div>
            <div class="gallery-item"><img src="../assets/images/gallery3.jpg" alt="Medical Equipment"></div>
            <div class="gallery-item"><img src="../assets/images/gallery4.jpg" alt="Lab Testing"></div>
            <div class="gallery-item"><img src="../assets/images/gallery5.jpg" alt="Ward Beds"></div>
            <div class="gallery-item"><img src="../assets/images/gallery6.jpg" alt="Surgery Room"></div>
        </div>
    </div>

    <div class="floating-ai-btn">
        <i class="fa-solid fa-robot"></i>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
